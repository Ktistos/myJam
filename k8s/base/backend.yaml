apiVersion: v1
kind: Service
metadata:
  name: jam-backend
  labels:
    app.kubernetes.io/name: jam-backend
    app.kubernetes.io/part-of: jam
spec:
  selector:
    app.kubernetes.io/name: jam-backend
    app.kubernetes.io/part-of: jam
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jam-backend
  labels:
    app.kubernetes.io/name: jam-backend
    app.kubernetes.io/part-of: jam
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jam-backend
      app.kubernetes.io/part-of: jam
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jam-backend
        app.kubernetes.io/part-of: jam
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: jam-secrets
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -ceu
            - |
              until pg_isready -h postgres -U postgres -d jam; do
                echo "waiting for Postgres"
                sleep 2
              done
        - name: wait-redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ceu
            - |
              until redis-cli -h redis ping; do
                echo "waiting for Redis"
                sleep 2
              done
        - name: wait-minio
          image: minio/mc:RELEASE.2025-07-21T05-28-08Z
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: jam-config
            - secretRef:
                name: jam-secrets
          command:
            - /bin/sh
            - -ceu
            - |
              until mc alias set jam "http://${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"; do
                echo "waiting for MinIO"
                sleep 2
              done
      containers:
        - name: backend
          image: docker.io/ktistos/myjam-backend:dev-204a4ab-20260419191921
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: jam-config
            - secretRef:
                name: jam-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
