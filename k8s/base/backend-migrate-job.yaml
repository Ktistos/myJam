apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  labels:
    app.kubernetes.io/name: backend-migrate
    app.kubernetes.io/part-of: jam
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-migrate
        app.kubernetes.io/part-of: jam
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: jam-secrets
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -ceu
            - |
              until pg_isready -h postgres -U postgres -d jam; do
                echo "waiting for Postgres"
                sleep 2
              done
      containers:
        - name: migrate
          image: docker.io/ktistos/myjam-backend:dev-204a4ab-20260419191921
          imagePullPolicy: IfNotPresent
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: jam-config
            - secretRef:
                name: jam-secrets
