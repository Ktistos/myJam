apiVersion: v1
kind: Service
metadata:
  name: jam-backend
  namespace: jam
spec:
  selector:
    app: jam-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jam-backend
  namespace: jam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jam-backend
  template:
    metadata:
      labels:
        app: jam-backend
    spec:
      containers:
        - name: backend
          image: jam-backend:minikube
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: jam-backend-config
            - secretRef:
                name: jam-backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
